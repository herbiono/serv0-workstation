"$schema" = 'https://starship.rs/config-schema.json'

# Define the right prompt with diamond separators
right_format = """$cmd_duration[◆](dimmed white)$memory_usage[◆](dimmed white)$time"""

[memory_usage]
disabled = false
threshold = 0
symbol = "󰍛 "
# Display as 9GiB/16GiB
format = " [$symbol$ram]($style) "
style = "green bold"

[time]
disabled = false
time_format = "%H:%M"
format = " [$time]($style)"
style = "cyan bold"

[cmd_duration]
min_time = 0
show_milliseconds = true
format = "took [$duration]($style) "
style = "yellow"

####### end of right prompt #######

[directory]
# read_only = " 󰌾"
# Agnoster short style (matches your ../ folder layout)
truncation_length = 1
truncation_symbol = "...."
# truncate_to_repo = false

style = "blue bold"

# Use the heart folder icon ()
# Putting $path and the icon inside the same bracket ensures they are both pink
# format = "[../..$path]($style)  "

# Ensure the home symbol is also styled if you're in home
home_symbol = "~"
format = "[$path]($style) "
# Use the decorative format only when you are 'deeper' in a directory/repo
# repo_root_format = "[....$path]($style) "

